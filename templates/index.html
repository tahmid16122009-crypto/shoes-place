<!DOCTYPE html>
<html>
<head>
  <title>Shop</title>
</head>
<body>

{% if not user %}
<h3>Login</h3>
<form action="/login" method="POST">
  <input name="name" placeholder="Name">
  <input name="phone" placeholder="Phone">
  <button>Login</button>
</form>

<form action="/login" method="POST">
  <input type="hidden" name="name" value="Guest">
  <input type="hidden" name="phone" value="000">
  <button>Skip</button>
</form>
{% else %}
<p>Welcome {{user.name}}</p>
{% endif %}

<hr>

<h2>Products</h2>

{% for p in products %}
  <div>
    <img src="{{p.image}}" width="120"><br>
    {{p.name}} - {{p.price}}<br>
    <a href="/add/{{p.id}}">Add to cart</a>
  </div>
  <hr>
{% endfor %}

<h2>Cart</h2>
{% for c in cart_items %}
  <div>{{c.name}}</div>
{% endfor %}

<form action="/order" method="POST">
  <input name="address" placeholder="Address">
  <button>Place Order</button>
</form>

<h2>Orders</h2>
{% for o in orders %}
  <div>
    {{o.product_name}} - {{o.status}}
  </div>
{% endfor %}

</body>
</html>
