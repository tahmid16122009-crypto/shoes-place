<!DOCTYPE html>
<html>
<head>
    <title>Shop</title>
    <style>
        body { font-family: Arial; margin:0; }
        .header { padding:10px; background:#ff6600; color:white; }
        .search { width:100%; padding:10px; }
        .product { border:1px solid #ddd; margin:10px; padding:10px; }
        .bottom { position:fixed; bottom:0; width:100%; display:flex; background:#fff; border-top:1px solid #ccc; }
        .bottom div { flex:1; text-align:center; padding:10px; }
    </style>
</head>

<body>

<div class="header">
    <input class="search" placeholder="Search product...">
</div>

<h3>Products</h3>

{% for p in products %}
<div class="product">
    <img src="{{p.image}}" width="100%">
    <h4>{{p.name}}</h4>
    <p>{{p.price}}</p>
    <a href="/add/{{p.id}}">Add to Cart</a>
</div>
{% endfor %}

<h3>Cart</h3>
{% for c in cart %}
<p>Product ID: {{c}}</p>
{% endfor %}

<form action="/order" method="POST">
    <input name="name" placeholder="Name"><br>
    <input name="phone" placeholder="Phone"><br>
    <button>Place Order</button>
</form>

<h3>My Orders</h3>
{% for o in orders %}
<p>{{o.product_name}} - {{o.status}}</p>
{% endfor %}

<div class="bottom">
    <div>Home</div>
    <div>Cart</div>
    <div>Ordered</div>
    <div>Me</div>
</div>

</body>
</html>
