<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body{
margin:0;
font-family:sans-serif;
background:#f5fbff;
}

.header{
background:skyblue;
padding:12px;
text-align:center;
font-weight:bold;
}

.container{
padding:10px;
margin-bottom:70px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
}

button{
width:100%;
padding:10px;
margin-top:5px;
background:skyblue;
border:none;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:white;
padding:10px;
border-top:1px solid #ccc;
}

a{text-decoration:none;color:black}
</style>
</head>

<body>

<div class="header">
<a href="/home">⬅ Back</a>
</div>

<div class="container">
{% block content %}{% endblock %}
</div>

<div class="bottom">
<a href="/home">Home</a>
<a href="/cart">Cart</a>
<a href="/orders">Orders</a>
<a href="/me">Me</a>
</div>

</body>
</html>
