<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>
body{margin:0;font-family:sans-serif;background:#f5fbff}

.container{padding:10px;margin-bottom:80px}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:white;
padding:10px;
}

.bottom a{
background:skyblue;
padding:10px;
border-radius:10px;
font-size:16px;
text-decoration:none;
color:black;
}

.card{
background:white;
padding:10px;
margin:10px 0;
border-radius:10px;
}

img{width:100%;border-radius:10px}
button{width:100%;padding:10px;background:skyblue;border:none;border-radius:10px}
</style>
</head>

<body>

<div class="container">
{% block content %}{% endblock %}
</div>

<div class="bottom">
<a href="/home">Home</a>
<a href="/cart">Cart</a>
<a href="/orders">Orders</a>
<a href="/me">Me</a>
</div>

</body>
</html>
