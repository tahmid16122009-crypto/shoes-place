<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>My Shop</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(to bottom,#eaf6ff,#ffffff);
}

/* container */
.container{
padding:12px;
margin-bottom:90px;
}

/* header */
.header{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

/* card */
.card{
background:white;
padding:12px;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:12px;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

/* image */
.img{
width:100%;
height:130px;
object-fit:cover;
border-radius:12px;
}

/* button */
button{
width:100%;
padding:10px;
background:linear-gradient(45deg,skyblue,deepskyblue);
border:none;
border-radius:10px;
color:white;
font-size:15px;
margin-top:6px;
}

/* input */
input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid #ddd;
}

/* grid */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

/* bottom nav */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:white;
padding:10px 0;
box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.bottom a{
text-decoration:none;
color:black;
text-align:center;
font-size:13px;
}

.bottom div{
background:linear-gradient(45deg,skyblue,deepskyblue);
padding:8px;
border-radius:12px;
color:white;
min-width:60px;
}

/* back */
.back{
display:inline-block;
margin-bottom:10px;
text-decoration:none;
color:black;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<a href="javascript:history.back()" class="back">⬅</a>

{% block content %}{% endblock %}

</div>

<div class="bottom">
<a href="/home"><div>🏠<br>Home</div></a>
<a href="/cart"><div>🛒<br>Cart</div></a>
<a href="/orders"><div>📦<br>Orders</div></a>
<a href="/me"><div>👤<br>Me</div></a>
</div>

</body>
</html>
