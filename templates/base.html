<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>My Shop</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f5fbff;
}

.container{
padding:12px;
margin-bottom:90px;
}

/* CARD */
.card{
background:white;
padding:12px;
margin:10px 0;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* IMAGE */
img{
width:100%;
border-radius:10px;
}

/* BUTTON */
button{
width:100%;
padding:10px;
background:skyblue;
border:none;
border-radius:10px;
font-size:16px;
}

/* INPUT */
input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

/* NAVBAR */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:white;
padding:10px 0;
box-shadow:0 -2px 5px rgba(0,0,0,0.1);
}

.bottom a{
background:skyblue;
padding:8px 12px;
border-radius:12px;
text-align:center;
font-size:14px;
color:black;
text-decoration:none;
min-width:60px;
}

/* BACK BUTTON */
.back{
display:inline-block;
margin-bottom:10px;
text-decoration:none;
color:black;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<!-- 🔙 Back Button -->
<a href="javascript:history.back()" class="back">⬅ Back</a>

{% block content %}{% endblock %}

</div>

<!-- 🔽 Bottom Navigation -->
<div class="bottom">
<a href="/home">🏠<br>Home</a>
<a href="/cart">🛒<br>Cart</a>
<a href="/orders">📦<br>Orders</a>
<a href="/me">👤<br>Me</a>
</div>

</body>
</html>
