{% extends "base.html" %}
{% block content %}

<h2>Orders</h2>

{% for o in orders %}
<div class="card">
<img src="{{o.image}}">
<p>{{o.product_name}}</p>
<p>Qty: {{o.quantity}}</p>
<p>Date: {{o.date}}</p>
</div>
{% endfor %}

{% if not orders %}
<p>Nothing has been ordered yet.</p>
<a href="/home"><button>Order Now</button></a>
{% endif %}

{% endblock %}
