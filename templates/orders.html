{% extends "base.html" %}
{% block content %}

<h2>Orders</h2>

{% if orders %}
{% for o in orders %}
<div class="card">

<img src="{{o.image}}" class="img">

<h4>{{o.product_name}}</h4>
<p>Qty: {{o.quantity}}</p>
<p>{{o.date}}</p>

</div>
{% endfor %}
{% else %}
<p>Nothing has been ordered yet.</p>
<a href="/home"><button>Order Now</button></a>
{% endif %}

{% endblock %}
