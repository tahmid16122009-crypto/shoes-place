{% extends "base.html" %}
{% block content %}

<h2>Orders</h2>

{% if orders %}
{% for o in orders %}
<div class="card">
<p>{{o.product_name}}</p>
<p>Qty: {{o.quantity}}</p>
</div>
{% endfor %}
{% else %}
<p style="text-align:center">Nothing has been ordered yet.</p>
<a href="/home">
<button>Order Now</button>
</a>
{% endif %}

{% endblock %}
