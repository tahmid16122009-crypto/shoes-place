{% extends "base.html" %}
{% block content %}

{% if user %}
<h2>{{user.name}}</h2>
<p>{{user.phone}}</p>
{% else %}

<form method="POST" action="/login">
<input name="name" placeholder="Name" class="btn">
<input name="phone" placeholder="Phone" class="btn">
<button class="btn">Login</button>
</form>

{% endif %}

{% endblock %}
