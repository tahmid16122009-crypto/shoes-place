{% extends "base.html" %}
{% block content %}

<h2>👤 My Profile</h2>

<div class="card">
<p>Name: {{session.get('user')}}</p>
<p>Phone: {{session.get('phone')}}</p>
</div>

<h3>Edit Profile</h3>

<form method="POST" action="/update_profile">
<input name="name" placeholder="New Name">
<input name="phone" placeholder="New Phone">
<button>Update</button>
</form>

{% endblock %}
