<a href="/home">⬅ Back</a>

{% if user %}
<h1>{{user.name}}</h1>
<p>{{user.phone}}</p>
{% else %}
<form method="POST" action="/login">
<input name="name" placeholder="Name" style="width:100%;padding:10px">
<input name="phone" placeholder="Phone" style="width:100%;padding:10px">
<button style="background:skyblue;width:100%;padding:12px">Login</button>
</form>
{% endif %}
