{% extends "base.html" %}
{% block content %}

<h2>🛒 Cart</h2>

{% if products %}
{% for p in products %}
<div class="card">
<img src="{{p.image}}">
<h4>{{p.name}}</h4>
<p>{{p.price}}৳</p>

<a href="/product/{{p.id}}">
<button>View</button>
</a>

<a href="/remove_cart/{{p.id}}">
<button style="background:red">Remove</button>
</a>
</div>
{% endfor %}
{% else %}
<p>No products added yet.</p>
{% endif %}

{% endblock %}
