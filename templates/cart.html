{% extends "base.html" %}
{% block content %}

<h2>Cart</h2>

{% if products %}
{% for p in products %}
<div class="card">
<img src="{{p.image}}">
<p>{{p.name}}</p>

<a href="/product/{{p.id}}">
<button>View</button>
</a>

<a href="/remove_cart/{{p.id}}">
<button style="background:red;color:white">Remove</button>
</a>
</div>
{% endfor %}
{% else %}
<p>No products added to cart yet.</p>
{% endif %}

{% endblock %}
