<h2>Cart</h2>

{% for i in items %}
<div>
{{i.name}} ({{i.qty}})
<a href="/inc/{{i.id}}">+</a>
<a href="/dec/{{i.id}}">-</a>
= {{i.subtotal}}৳
</div>
{% endfor %}

<h3>Total: {{total}}৳</h3>

<form method="POST" action="/order">
<input name="address" placeholder="Full Address" required>
<button>Place Order</button>
</form>
