{% extends "base.html" %}
{% block content %}

<h2>Cart</h2>

{% for i in items %}
<div style="margin:10px;font-size:18px">
{{i.name}} x {{i.qty}}
</div>
{% endfor %}

<form method="POST" action="/order">
<input name="address" placeholder="Address" class="btn">
<button class="btn">Place Order</button>
</form>

{% endblock %}
