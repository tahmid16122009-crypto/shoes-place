<!DOCTYPE html>
<html>
<body style="font-family:sans-serif">

<img src="{{p.image}}" style="width:100%">

<h2>{{p.name}}</h2>
<p>{{p.description}}</p>
<h3>{{p.price}}৳</h3>

<form method="POST" action="/order">

<input name="district" placeholder="District" required>
<input name="address" placeholder="Village / Road / House" required>

<input type="hidden" name="product_id" value="{{p.id}}">

<button style="background:skyblue;padding:10px;width:100%">Order Now</button>

</form>

</body>
</html>
