{% extends "base.html" %}
{% block content %}

<img src="{{p.image}}" style="width:100%">

<h2>{{p.name}}</h2>

<button onclick="showForm()">Order</button>

<div id="formBox" style="display:none">

<form method="POST" action="/order">

<select id="district" name="district"></select>
<select id="upazila" name="union"></select>

<button>Submit</button>

</form>

</div>

<script>
function showForm(){
document.getElementById("formBox").style.display="block";
}

/* 🔥 STORAGE SYSTEM */
let DATA = JSON.parse(localStorage.getItem("BD_FULL_DATA") || "{}");

/* 🔥 IF DATA নাই → API থেকে আনবে */
async function loadData(){

if(Object.keys(DATA).length > 0){
render(DATA);
return;
}

let districts = await fetch("https://bdapi.vercel.app/api/v.1/district").then(r=>r.json());
let upazilas = await fetch("https://bdapi.vercel.app/api/v.1/upazila").then(r=>r.json());

let map = {};

/* 🔥 MAP বানানো */
upazilas.data.forEach(u=>{
if(!map[u.district]){
map[u.district] = [];
}
map[u.district].push(u.name);
});

/* 🔥 SAVE (offline) */
localStorage.setItem("BD_FULL_DATA", JSON.stringify(map));

DATA = map;

render(DATA);
}

/* 🔥 RENDER DISTRICT */
function render(data){

let districtBox = document.getElementById("district");

Object.keys(data).forEach(d=>{
let opt=document.createElement("option");
opt.value=d;
opt.innerText=d;
districtBox.appendChild(opt);
});

}

/* 🔥 DISTRICT CHANGE */
document.getElementById("district").onchange=function(){

let list = DATA[this.value] || [];

let up = document.getElementById("upazila");
up.innerHTML="";

list.forEach(u=>{
let opt=document.createElement("option");
opt.value=u;
opt.innerText=u;
up.appendChild(opt);
});

};

/* 🔥 START */
loadData();

</script>

{% endblock %}
