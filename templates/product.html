{% extends "base.html" %}
{% block content %}

<img src="{{p.image}}" style="width:100%;max-height:280px;object-fit:cover;border-radius:10px">

<h2>{{p.name}}</h2>
<p>{{p.description}}</p>
<h3>{{p.price}}৳</h3>

<a href="/add/{{p.id}}">
<button class="btn">Add to Cart</button>
</a>

<button class="btn" onclick="showForm()">Order Now</button>

<div id="formBox" style="display:none;margin-top:10px">

<form method="POST" action="/order">

<input name="name" placeholder="Name" class="btn">
<input name="phone" placeholder="Phone number" class="btn">

<!-- 🔍 SEARCHABLE DISTRICT -->
<input type="text" id="districtSearch" placeholder="Search District..." class="btn">

<select id="district" name="district" class="btn"></select>

<!-- 🔍 SEARCHABLE UNION -->
<input type="text" id="unionSearch" placeholder="Search Area..." class="btn">

<select id="union" name="union" class="btn">
<option>Select district first</option>
</select>

<!-- NEW FIELDS -->
<input name="village" placeholder="Village name" class="btn">
<input name="road" placeholder="Road name (optional)" class="btn">
<input name="holding" placeholder="Holding number (optional)" class="btn">

<button class="btn">Confirm Order</button>

</form>

</div>

<script>
function showForm(){
    document.getElementById("formBox").style.display="block";
}

const districtSelect = document.getElementById("district");
const unionSelect = document.getElementById("union");

const districtSearch = document.getElementById("districtSearch");
const unionSearch = document.getElementById("unionSearch");

let districts = [];
let upazilas = [];

/* 🔥 LOAD ALL DATA ONCE (FIX LOADING BUG) */
fetch("https://bdapi.vercel.app/api/v.1/district")
.then(res => res.json())
.then(data => {
    districts = data.data;
    renderDistricts(districts);
});

fetch("https://bdapi.vercel.app/api/v.1/upazila")
.then(res => res.json())
.then(data => {
    upazilas = data.data;
});

/* 🎯 RENDER DISTRICT */
function renderDistricts(list){
    districtSelect.innerHTML = "";
    list.forEach(d => {
        let opt = document.createElement("option");
        opt.value = d.name;
        opt.innerHTML = d.name;
        districtSelect.appendChild(opt);
    });
}

/* 🔍 DISTRICT SEARCH */
districtSearch.addEventListener("keyup", function(){
    let val = this.value.toLowerCase();
    let filtered = districts.filter(d => d.name.toLowerCase().includes(val));
    renderDistricts(filtered);
});

/* 🎯 DISTRICT CHANGE → LOAD UNION */
districtSelect.addEventListener("change", function(){

    let selected = this.value.toLowerCase();

    let filtered = upazilas.filter(u => 
        u.district.toLowerCase() === selected
    );

    renderUnions(filtered);
});

/* 🎯 RENDER UNION */
function renderUnions(list){
    unionSelect.innerHTML = "";
    list.forEach(u => {
        let opt = document.createElement("option");
        opt.value = u.name;
        opt.innerHTML = u.name;
        unionSelect.appendChild(opt);
    });
}

/* 🔍 UNION SEARCH */
unionSearch.addEventListener("keyup", function(){

    let val = this.value.toLowerCase();

    let selected = districtSelect.value.toLowerCase();

    let filtered = upazilas.filter(u =>
        u.district.toLowerCase() === selected &&
        u.name.toLowerCase().includes(val)
    );

    renderUnions(filtered);
});
</script>

{% endblock %}
