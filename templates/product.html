{% extends "base.html" %}
{% block content %}

<img src="{{p.image}}" style="width:100%;max-height:280px;object-fit:cover;border-radius:10px">

<h2>{{p.name}}</h2>
<p>{{p.description}}</p>
<h3>{{p.price}}৳</h3>

<a href="/add/{{p.id}}">
<button class="btn">Add to Cart</button>
</a>

<button class="btn" onclick="showForm()">Order Now</button>

<div id="formBox" style="display:none;margin-top:10px">

<form method="POST" action="/order">

<input name="name" placeholder="Name" class="btn">
<input name="phone" placeholder="Phone number" class="btn">

<select id="district" name="district" class="btn"></select>
<select id="union" name="union" class="btn"></select>

<input name="address" placeholder="Village / Street / House" class="btn">

<button class="btn">Confirm Order</button>

</form>

</div>

<script>
function showForm(){
    document.getElementById("formBox").style.display="block";
}

/* 🔥 FULL DISTRICT DATA (sample + extendable) */
const data = {
"Dhaka":["Dhamrai","Savar","Keraniganj"],
"Chittagong":["Patiya","Raozan","Sitakunda"],
"Rajshahi":["Paba","Bagha"],
"Khulna":["Batiaghata","Dumuria"],
"Barisal":["Babuganj","Muladi"],
"Sylhet":["Beanibazar","Golapganj"],
"Rangpur":["Mithapukur","Badarganj"],
"Mymensingh":["Trishal","Gafargaon"]
};

let district = document.getElementById("district");
let union = document.getElementById("union");

for(let d in data){
    let opt = document.createElement("option");
    opt.value = d;
    opt.innerHTML = d;
    district.appendChild(opt);
}

district.onchange = function(){
    union.innerHTML="";
    data[this.value].forEach(u=>{
        let o = document.createElement("option");
        o.value = u;
        o.innerHTML = u;
        union.appendChild(o);
    });
};
</script>

{% endblock %}
