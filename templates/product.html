{% extends "base.html" %}
{% block content %}

<img src="{{p.image}}" style="width:100%;max-height:280px;object-fit:cover;border-radius:10px">

<h2>{{p.name}}</h2>
<p>{{p.description}}</p>
<h3>{{p.price}}৳</h3>

<button class="btn" onclick="showForm()">Order Now</button>

<div id="formBox" style="display:none;margin-top:10px">

<form method="POST" action="/order">

<input name="name" placeholder="Name" class="btn">
<input name="phone" placeholder="Phone number" class="btn">

<input id="districtSearch" placeholder="Search District" class="btn">
<select id="district" name="district" class="btn"></select>

<input id="unionSearch" placeholder="Search Area" class="btn">
<select id="union" name="union" class="btn"></select>

<input name="village" placeholder="Village name" class="btn">
<input name="road" placeholder="Road name (optional)" class="btn">
<input name="holding" placeholder="Holding number (optional)" class="btn">

<button class="btn">Confirm Order</button>

</form>

</div>

<script>
function showForm(){
    document.getElementById("formBox").style.display="block";
}

let districts = [];
let upazilas = [];

fetch("https://bdapi.vercel.app/api/v.1/district")
.then(res=>res.json())
.then(d=>{
    districts = d.data;
    renderDistrict(districts);
});

fetch("https://bdapi.vercel.app/api/v.1/upazila")
.then(res=>res.json())
.then(d=>{
    upazilas = d.data;
});

function renderDistrict(list){
    let d = document.getElementById("district");
    d.innerHTML="";
    list.forEach(x=>{
        let o=document.createElement("option");
        o.value=x.name;
        o.innerHTML=x.name;
        d.appendChild(o);
    });
}

document.getElementById("districtSearch").onkeyup=function(){
    let val=this.value.toLowerCase();
    renderDistrict(districts.filter(x=>x.name.toLowerCase().includes(val)));
}

document.getElementById("district").onchange=function(){
    let val=this.value.toLowerCase();
    let list=upazilas.filter(x=>x.district.toLowerCase()==val);
    renderUnion(list);
}

function renderUnion(list){
    let u=document.getElementById("union");
    u.innerHTML="";
    list.forEach(x=>{
        let o=document.createElement("option");
        o.value=x.name;
        o.innerHTML=x.name;
        u.appendChild(o);
    });
}

document.getElementById("unionSearch").onkeyup=function(){
    let val=this.value.toLowerCase();
    let d=document.getElementById("district").value.toLowerCase();
    let list=upazilas.filter(x=>x.district.toLowerCase()==d && x.name.toLowerCase().includes(val));
    renderUnion(list);
}
</script>

{% endblock %}
