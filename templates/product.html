{% extends "base.html" %}
{% block content %}

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<img src="{{p.image}}" style="width:100%;max-height:280px;object-fit:cover;border-radius:10px">

<h2>{{p.name}}</h2>
<p>{{p.description}}</p>
<h3>{{p.price}}৳</h3>

<button class="btn" onclick="showForm()">Order Now</button>

<div id="formBox" style="display:none;margin-top:10px">

<form method="POST" action="/order">

<input name="name" placeholder="Name" class="btn" required>
<input name="phone" placeholder="Phone number" class="btn" required>

<!-- DISTRICT -->
<select id="district" name="district" class="btn" required>
<option>Select District</option>
</select>

<!-- UPAZILA -->
<select id="upazila" name="union" class="btn" required>
<option>Select district first</option>
</select>

<input type="text" id="searchUpazila" placeholder="Search Upazila" class="btn">

<input name="village" placeholder="Village name" class="btn" required>
<input name="road" placeholder="Road (optional)" class="btn">
<input name="holding" placeholder="Holding (optional)" class="btn">

<button class="btn">Confirm Order</button>

</form>

</div>

<script>
function showForm(){
    document.getElementById("formBox").style.display="block";
}

let districts = [];
let upazilas = [];
let dataLoaded = false;

const districtBox = document.getElementById("district");
const upazilaBox = document.getElementById("upazila");

/* 🔥 LOAD DATA */
async function loadData(){
    try{
        let d = await fetch("https://bdapi.vercel.app/api/v.1/district").then(r=>r.json());
        let u = await fetch("https://bdapi.vercel.app/api/v.1/upazila").then(r=>r.json());

        districts = d.data;
        upazilas = u.data;

        dataLoaded = true;

        renderDistrict(districts);
    }catch(e){
        console.log("API FAIL → using fallback");

        /* fallback data */
        districts = [
            {name:"Dhaka"},
            {name:"Chittagong"},
            {name:"Sylhet"}
        ];

        upazilas = [
            {name:"Savar", district:"Dhaka"},
            {name:"Dhamrai", district:"Dhaka"},
            {name:"Patiya", district:"Chittagong"},
            {name:"Raozan", district:"Chittagong"},
            {name:"Beanibazar", district:"Sylhet"}
        ];

        dataLoaded = true;
        renderDistrict(districts);
    }
}

/* DISTRICT RENDER */
function renderDistrict(list){
    districtBox.innerHTML = "<option>Select District</option>";

    list.forEach(d=>{
        let opt=document.createElement("option");
        opt.value=d.name;
        opt.innerText=d.name;
        districtBox.appendChild(opt);
    });
}

/* UPAZILA RENDER */
function renderUpazila(list){
    upazilaBox.innerHTML = "";

    if(list.length === 0){
        upazilaBox.innerHTML = "<option>No data found</option>";
        return;
    }

    list.forEach(u=>{
        let opt=document.createElement("option");
        opt.value=u.name;
        opt.innerText=u.name;
        upazilaBox.appendChild(opt);
    });
}

/* DISTRICT CHANGE */
districtBox.onchange = function(){

    if(!dataLoaded){
        alert("Loading data... wait একটু");
        return;
    }

    let selected = this.value.toLowerCase();

    let filtered = upazilas.filter(u =>
        u.district && u.district.toLowerCase() === selected
    );

    console.log("Filtered:", filtered);

    renderUpazila(filtered);
};

/* SEARCH */
document.getElementById("searchUpazila").onkeyup = function(){

    let val = this.value.toLowerCase();
    let selected = districtBox.value.toLowerCase();

    let filtered = upazilas.filter(u =>
        u.district &&
        u.district.toLowerCase() === selected &&
        u.name.toLowerCase().includes(val)
    );

    renderUpazila(filtered);
};

/* START */
loadData();

</script>

{% endblock %}
