{% extends "base.html" %}
{% block content %}

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<img src="{{p.image}}" style="width:100%;max-height:280px;object-fit:cover;border-radius:10px">

<h2>{{p.name}}</h2>
<p>{{p.description}}</p>
<h3>{{p.price}}৳</h3>

<button class="btn" onclick="showForm()">Order Now</button>

<div id="formBox" style="display:none;margin-top:10px">

<form method="POST" action="/order">

<input name="name" placeholder="Name" class="btn" required>
<input name="phone" placeholder="Phone number" class="btn" required>

<!-- DISTRICT -->
<select id="district" name="district" class="btn" required></select>

<!-- UPAZILA (CLICK করলে show হবে) -->
<select id="upazila" name="union" class="btn" required>
<option>Select district first</option>
</select>

<!-- SEARCH -->
<input type="text" id="searchUpazila" placeholder="Search Upazila" class="btn">

<!-- ADDRESS -->
<input name="village" placeholder="Village name" class="btn" required>
<input name="road" placeholder="Road name (optional)" class="btn">
<input name="holding" placeholder="Holding number (optional)" class="btn">

<button class="btn">Confirm Order</button>

</form>

</div>

<script>
function showForm(){
    document.getElementById("formBox").style.display="block";
}

let districts = [];
let upazilas = [];

const districtBox = document.getElementById("district");
const upazilaBox = document.getElementById("upazila");

/* LOAD DISTRICT */
fetch("https://bdapi.vercel.app/api/v.1/district")
.then(res=>res.json())
.then(data=>{
    districts = data.data;

    districtBox.innerHTML = "<option>Select District</option>";

    districts.forEach(d=>{
        let opt=document.createElement("option");
        opt.value=d.name;
        opt.innerText=d.name;
        districtBox.appendChild(opt);
    });
});

/* LOAD UPAZILA (ONCE) */
fetch("https://bdapi.vercel.app/api/v.1/upazila")
.then(res=>res.json())
.then(data=>{
    upazilas = data.data;
});

/* DISTRICT CHANGE → LOAD UPAZILA */
districtBox.onchange = function(){

    let selected = this.value.toLowerCase();

    let filtered = upazilas.filter(u =>
        u.district.toLowerCase() === selected
    );

    renderUpazila(filtered);
};

/* RENDER FUNCTION */
function renderUpazila(list){
    upazilaBox.innerHTML = "";

    list.forEach(u=>{
        let opt=document.createElement("option");
        opt.value=u.name;
        opt.innerText=u.name;
        upazilaBox.appendChild(opt);
    });
}

/* SEARCH */
document.getElementById("searchUpazila").onkeyup = function(){

    let val = this.value.toLowerCase();
    let selected = districtBox.value.toLowerCase();

    let filtered = upazilas.filter(u =>
        u.district.toLowerCase() === selected &&
        u.name.toLowerCase().includes(val)
    );

    renderUpazila(filtered);
};
</script>

{% endblock %}
