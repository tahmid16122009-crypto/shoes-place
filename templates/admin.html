<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{font-family:Arial;background:#f5f5f5;margin:0}
    .box{background:#fff;margin:10px;padding:12px;border-radius:10px}
    input,button{padding:10px;width:100%;margin:5px 0}
    button{background:#ff6600;color:#fff;border:none;border-radius:6px}
    img{width:100%;border-radius:8px}
    .btns a{padding:6px 10px;margin:3px;text-decoration:none;color:#fff;border-radius:6px}
    .ok{background:green}
    .no{background:red}
  </style>
</head>
<body>

<div class="box">
  <h2>Add Product</h2>
  <form action="/add_product" method="POST" enctype="multipart/form-data">
    <input name="name" placeholder="Product Name" required>
    <input name="price" placeholder="Price" required>
    <input name="description" placeholder="Description">
    <input type="file" name="image" required>
    <button>Add Product</button>
  </form>
</div>

<div class="box">
  <h2>Products</h2>
  {% for p in products %}
    <div class="box">
      <img src="{{p.image}}">
      <h3>{{p.name}}</h3>
      <p>{{p.price}}</p>
      <p>{{p.description}}</p>
    </div>
  {% endfor %}
</div>

<div class="box">
  <h2>Orders</h2>

  {% for o in orders %}
    <div class="box">
      <b>{{o.product_name}}</b><br>
      {{o.customer_name}} - {{o.phone}}<br>
      Qty: {{o.quantity}}<br>
      Status: {{o.status}}<br><br>

      <div class="btns">
        <a class="ok" href="/update_order/{{o.id}}/Order placed">✔ Placed</a>
        <a class="no" href="/update_order/{{o.id}}/Order cancelled">❌ Cancel</a>
      </div>
    </div>
  {% endfor %}
</div>

</body>
</html>
