<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{font-family:Arial;margin:0;background:#f5f5f5}
    .box{background:#fff;margin:10px;padding:12px;border-radius:8px}
    input,button{padding:10px;margin:6px 0;width:100%}
    button{background:#ff6600;color:#fff;border:none;border-radius:6px}
    .row{display:flex;gap:6px}
    .row a{flex:1;text-align:center;padding:8px;border-radius:6px;text-decoration:none;color:#fff}
    .ok{background:#2ecc71}
    .no{background:#e74c3c}
    img{max-width:100%;border-radius:6px}
  </style>
</head>
<body>

<div class="box">
  <h3>Add Product</h3>
  <form action="/add_product" method="POST" enctype="multipart/form-data">
    <input name="name" placeholder="Name" required>
    <input name="price" placeholder="Price" required>
    <input name="description" placeholder="Description">
    <input type="file" name="image" required>
    <button>Add Product</button>
  </form>
</div>

<div class="box">
  <h3>Products</h3>
  {% for p in products %}
    <div class="box">
      <img src="{{p.image}}">
      <b>{{p.name}}</b><br>
      {{p.price}}<br>
      {{p.description or ""}}
    </div>
  {% endfor %}
</div>

<div class="box">
  <h3>Orders</h3>
  {% for o in orders %}
    <div class="box">
      <b>{{o.product_name}}</b><br>
      {{o.customer_name}} - {{o.phone}}<br>
      Status: {{o.status}}<br><br>
      <div class="row">
        <a class="ok" href="/update_order/{{o.id}}/Order placed">✔</a>
        <a class="no" href="/update_order/{{o.id}}/Order cancelled">❌</a>
      </div>
    </div>
  {% endfor %}
</div>

</body>
</html>
