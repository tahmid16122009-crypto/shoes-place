<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;font-family:sans-serif}
.top{background:skyblue;padding:10px}
.products{display:grid;grid-template-columns:1fr 1fr}
.card{padding:10px;text-align:center}
img{width:100%;height:120px;object-fit:cover}
.bottom{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#fff}
</style>
</head>

<body>

<div class="top">
<input placeholder="Search..." style="width:100%">
</div>

<div class="products">
{% for p in products %}
<div class="card">
<img src="{{p.image}}">
<h4>{{p.name}}</h4>
<p>{{p.price}}</p>
<a href="/product/{{p.id}}">View</a>
</div>
{% endfor %}
</div>

<div class="bottom">
<a href="/home">Home</a>
<a href="/cart">Cart</a>
<a href="/orders">Orders</a>
<a href="/admin">Me</a>
</div>

</body>
</html>
