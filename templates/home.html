{% extends "base.html" %}
{% block content %}

<h2>All Products</h2>

<div class="grid">
{% for p in products %}
<div class="card">

<img src="{{p.image}}" class="img">

<h4>{{p.name}}</h4>
<p>{{p.price}}৳</p>

<a href="/product/{{p.id}}">
<button>View</button>
</a>

</div>
{% endfor %}
</div>

<style>
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.img{
width:100%;
height:130px;
object-fit:cover;
border-radius:10px;
}
</style>

{% endblock %}
