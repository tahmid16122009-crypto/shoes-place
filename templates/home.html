<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:sans-serif}
.top{background:skyblue;padding:10px}
.products{display:flex;flex-wrap:wrap}
.card{width:45%;margin:5px;background:#fff;padding:10px;border-radius:10px;text-align:center}
img{width:100%;height:120px;object-fit:cover}
</style>
</head>
<body>

<div class="top">
<input placeholder="Search..." style="width:100%;padding:10px;border:none;border-radius:10px">
</div>

<div class="products">
{% for p in products %}
<div class="card">
<img src="{{p.image}}">
<h4>{{p.name}}</h4>
<p>{{p.price}}৳</p>
<a href="/product/{{p.id}}"><button>View</button></a>
</div>
{% endfor %}
</div>

</body>
</html>
