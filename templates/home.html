{% extends "base.html" %}
{% block content %}

<input placeholder="Search..." id="search">

<div class="grid">
{% for p in products %}
<div class="card">
<img src="{{p.image}}">
<h4>{{p.name}}</h4>
<p>{{p.price}}৳</p>
<a href="/product/{{p.id}}">
<button>View</button>
</a>
</div>
{% endfor %}
</div>

{% endblock %}
