{% extends "base.html" %}
{% block content %}

<h2>Products</h2>

<div class="grid">

{% for p in products %}
<div class="card">
<img src="{{p.image}}" class="product-img">

<h4>{{p.name}}</h4>
<p>{{p.price}}৳</p>

<a href="/product/{{p.id}}">
<button>View</button>
</a>
</div>
{% endfor %}

</div>

<style>
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.product-img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}
</style>

{% endblock %}
