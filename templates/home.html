<!DOCTYPE html>
<html>
<head>
<style>

body{
margin:0;
font-family:sans-serif;
background:#f5fbff;
}

.top{
padding:10px;
background:skyblue;
position:sticky;
top:0;
}

input{
width:95%;
padding:10px;
border-radius:10px;
border:none;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
width:45%;
margin:5px;
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:white;
padding:10px;
border-top:1px solid #ddd;
}

button{
background:skyblue;
border:none;
padding:8px;
border-radius:10px;
}

</style>
</head>
<body>

<div class="top">
<input placeholder="Search product...">
</div>

<div class="products">

{% for p in products %}
<div class="card">
<img src="{{p.image}}">
<h4>{{p.name}}</h4>
<p>{{p.price}}৳</p>
<a href="/product/{{p.id}}">
<button>View</button>
</a>
</div>
{% endfor %}

</div>

<div class="bottom">
<a href="/home">Home</a>
<a href="#">Cart</a>
<a href="#">Orders</a>
<a href="#">Me</a>
</div>

</body>
</html>
