{% extends "base.html" %}
{% block content %}

<div class="header">🛍 Products</div>

<input placeholder="Search product...">

<div class="grid">
{% for p in products %}
<div class="card">

<img src="{{p.image}}" class="img">

<h4>{{p.name}}</h4>
<p>{{p.price}}৳</p>

<a href="/product/{{p.id}}">
<button>View</button>
</a>

</div>
{% endfor %}
</div>

{% endblock %}
