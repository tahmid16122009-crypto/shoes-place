<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial;
            margin:0;
            padding:0;
            background:#f5f5f5;
        }

        .header{
            padding:15px;
            background:white;
            position:sticky;
            top:0;
            z-index:10;
        }

        .search{
            width:100%;
            padding:12px;
            font-size:16px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        .grid{
            display:grid;
            grid-template-columns: repeat(2, 1fr);
            gap:12px;
            padding:12px;
        }

        .card{
            background:white;
            border-radius:12px;
            padding:10px;
            text-align:center;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);
        }

        .card img{
            width:100%;
            height:150px;
            object-fit:cover;
            border-radius:10px;
        }

        .name{
            font-size:16px;
            margin-top:8px;
        }

        .price{
            font-size:15px;
            color:#555;
        }

        .btn{
            background:#87CEFA;
            border:none;
            padding:10px;
            width:100%;
            margin-top:8px;
            border-radius:8px;
            font-size:16px;
        }

        .bottom{
            position:fixed;
            bottom:0;
            width:100%;
            background:white;
            display:flex;
            justify-content:space-around;
            padding:10px 0;
            border-top:1px solid #ddd;
        }

        .bottom a{
            text-decoration:none;
            color:black;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="header">
    <input type="text" class="search" placeholder="Search product...">
</div>

<div class="grid">

{% for p in products %}
<div class="card">

    {% if p.image %}
    <img src="{{p.image}}">
    {% else %}
    <div style="height:150px;background:#ddd;border-radius:10px"></div>
    {% endif %}

    <div class="name">{{p.name}}</div>
    <div class="price">{{p.price}}৳</div>

    <a href="/product/{{p.id}}">
        <button class="btn">View</button>
    </a>

</div>
{% endfor %}

</div>

<div class="bottom">
    <a href="/home">Home</a>
    <a href="/cart">Cart</a>
    <a href="/orders">Orders</a>
    <a href="/me">Me</a>
</div>

</body>
</html>
