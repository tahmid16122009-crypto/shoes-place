<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<form>
<input name="q" value="{{q}}" placeholder="Search..." style="width:100%;padding:10px">
</form>

{% for p in products %}
<div style="padding:10px;border:1px solid #ddd;margin:10px">
<img src="{{p.image}}" width="100%">
<h3>{{p.name}}</h3>
<p>{{p.price}}৳</p>
<a href="/product/{{p.id}}">View</a>
</div>
{% endfor %}

<div class="nav">
<a href="/home">Home</a>
<a href="/cart">Cart</a>
<a href="/orders">Orders</a>
<a href="/me">Me</a>
</div>
