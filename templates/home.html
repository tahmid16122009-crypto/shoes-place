<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body{
            font-family: Arial;
            background:#f0f8ff;
            overflow-x:hidden;
            touch-action: manipulation; /* zoom disable fix */
        }

        /* ❌ ZOOM DISABLE */
        html, body {
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        /* HEADER */
        .header{
            padding:12px;
            background:#87CEFA;
            position:sticky;
            top:0;
            z-index:10;
        }

        .search{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            font-size:16px;
            outline:none;
        }

        /* PRODUCT GRID */
        .grid{
            display:grid;
            grid-template-columns: repeat(2, 1fr);
            gap:12px;
            padding:12px;
            padding-bottom:90px;
        }

        .card{
            background:white;
            border-radius:14px;
            overflow:hidden;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
            transition:0.2s;
        }

        .card:active{
            transform:scale(0.98);
        }

        .card img{
            width:100%;
            height:160px;
            object-fit:cover;
        }

        .info{
            padding:10px;
        }

        .name{
            font-size:16px;
            font-weight:bold;
        }

        .price{
            font-size:15px;
            color:#333;
            margin-top:5px;
        }

        .btn{
            width:100%;
            padding:10px;
            margin-top:8px;
            border:none;
            background:#87CEFA;
            font-size:16px;
            border-radius:8px;
        }

        /* BOTTOM NAV (NEXT LEVEL UI) */
        .bottom{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            background:white;
            display:flex;
            justify-content:space-around;
            padding:12px 0;
            border-top:1px solid #ddd;
        }

        .bottom a{
            text-decoration:none;
            color:#333;
            font-size:16px;
            font-weight:bold;
            padding:8px 12px;
            border-radius:8px;
        }

        .bottom a:active{
            background:#87CEFA;
            color:white;
        }

    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <input class="search" placeholder="Search products...">
</div>

<!-- PRODUCTS -->
<div class="grid">

{% for p in products %}
<div class="card">

    {% if p.image %}
    <img src="{{p.image}}">
    {% else %}
    <div style="height:160px;background:#ddd"></div>
    {% endif %}

    <div class="info">
        <div class="name">{{p.name}}</div>
        <div class="price">{{p.price}}৳</div>

        <a href="/product/{{p.id}}">
            <button class="btn">View</button>
        </a>
    </div>

</div>
{% endfor %}

</div>

<!-- BOTTOM NAV (BIG + SKYBLUE STYLE) -->
<div class="bottom">
    <a href="/home">Home</a>
    <a href="/cart">Cart</a>
    <a href="/orders">Orders</a>
    <a href="/me">Me</a>
</div>

</body>
</html>
