{% extends "base.html" %}
{% block content %}

<input placeholder="Search..." style="width:100%;padding:12px;border-radius:10px">

<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px">

{% for p in products %}
<div style="background:white;border-radius:10px;padding:8px">

<a href="/product/{{p.id}}">
<img src="{{p.image}}" style="width:100%;height:150px;object-fit:cover;border-radius:8px">
</a>

<div>{{p.name}}</div>
<div>{{p.price}}৳</div>

</div>
{% endfor %}

</div>

{% endblock %}
