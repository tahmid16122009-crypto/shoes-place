<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body{font-family:sans-serif;margin:0;padding-bottom:70px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
.card{border:1px solid #ddd;padding:10px;border-radius:10px}
.card img{width:100%;height:150px;object-fit:cover}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:white;border-top:1px solid #ccc}
.nav a{padding:12px}
</style>

<form>
<input name="q" value="{{q}}" placeholder="Search..." style="width:100%;padding:10px">
</form>

<div class="grid">
{% for p in products %}
<div class="card">
<a href="/product/{{p.id}}">
<img src="{{p.image}}">
<h4>{{p.name}}</h4>
<p>{{p.price}}৳</p>
</a>
</div>
{% endfor %}
</div>

<div class="nav">
<a href="/home">Home</a>
<a href="/cart">Cart</a>
<a href="/orders">Orders</a>
<a href="/me">Me</a>
</div>
